<div class="switcher" [class.open]="isOpen()">
  <button class="trigger" (click)="toggle()" type="button">
    <span class="label-stack">
      <span class="label">Viewing as</span>
      <span class="name">{{ current().fullName }}</span>
    </span>
    <span class="role-badge" [attr.data-role]="current().role">
      {{ current().role }}
    </span>
    <span class="caret">▾</span>
  </button>

  @if (isOpen()) {
    <div class="dropdown">
      <div class="dropdown-header">Switch persona</div>
      @for (persona of personas; track persona.email) {
        <button
          type="button"
          class="option"
          [class.selected]="persona.email === current().email"
          (click)="select(persona.email)"
        >
          <span class="option-name">{{ persona.fullName }}</span>
          <span class="option-email">{{ persona.email }}</span>
          <span class="option-role" [attr.data-role]="persona.role">{{ persona.role }}</span>
        </button>
      }
      <div class="dropdown-footer">
        Persona Switcher — Mock auth — Phase 6 will replace with real login
      </div>
    </div>
  }
</div>
