<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; max-width: 560px; margin: 0 auto; padding: 24px; color: #1f2937;">

<div th:replace="~{email/_layout :: header}"></div>

<div style="background: white; padding: 24px 20px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 8px 8px;">

  <h2 style="font-size: 18px; margin-top: 0;" th:text="'Welcome, ' + ${fullName}">Welcome, [Name]</h2>

  <p>Thanks for creating an OpenRecords account. To activate it, verify your email address by clicking the button below.</p>

  <p style="text-align: center; margin: 32px 0;">
    <a th:href="${verificationLink}"
       style="background: #1e3a8a; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; display: inline-block; font-weight: 600;">
      Verify email address
    </a>
  </p>

  <p style="font-size: 14px; color: #6b7280;">
    Or paste this link into your browser:<br>
    <a th:href="${verificationLink}" th:text="${verificationLink}"
       style="color: #1e3a8a; word-break: break-all;"></a>
  </p>

  <p style="font-size: 14px; color: #6b7280; margin-top: 32px;">
    This link expires in 24 hours. If you didn't create an account, you can safely ignore this email.
  </p>

</div>

<div th:replace="~{email/_layout :: footer}"></div>

</body>
</html>
