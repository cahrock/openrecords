<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; max-width: 560px; margin: 0 auto; padding: 24px; color: #1f2937;">

<div th:replace="~{email/_layout :: header}"></div>

<div style="background: white; padding: 24px 20px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 8px 8px;">

  <h2 style="font-size: 18px; margin-top: 0;" th:text="'Hi ' + ${requesterName} + ','">Hi [Name],</h2>

  <p style="font-size: 16px;"><strong th:text="${headline}">[Headline]</strong></p>

  <p th:text="${detail}">[Detail paragraph]</p>

  <div style="background: #f9fafb; border-left: 4px solid #1e3a8a; padding: 12px 16px; margin: 24px 0; border-radius: 4px;">
    <div style="font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em;">Request</div>
    <div style="font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; font-weight: 600; margin-top: 2px;" th:text="${trackingNumber}">[Tracking number]</div>
    <div style="font-size: 14px; color: #4b5563; margin-top: 4px;" th:text="${requestSubject}">[Subject]</div>
  </div>

  <p style="text-align: center; margin: 32px 0;">
    <a th:href="${detailLink}"
       style="background: #1e3a8a; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; display: inline-block; font-weight: 600;">
      View request details
    </a>
  </p>

  <p style="font-size: 14px; color: #6b7280;">
    Or paste this link into your browser:<br>
    <a th:href="${detailLink}" th:text="${detailLink}" style="color: #1e3a8a; word-break: break-all;"></a>
  </p>

</div>

<div th:replace="~{email/_layout :: footer}"></div>

</body>
</html>
