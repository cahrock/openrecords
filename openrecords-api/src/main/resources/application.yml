# ============================================================
# APPLICATION
# ============================================================
spring:
  application:
    name: openrecords-api

  # ============================================================
  # DATASOURCE - PostgreSQL
  # ============================================================
  datasource:
    url: ${OPENRECORDS_DB_URL:jdbc:postgresql://localhost:5432/openrecords}
    username: ${OPENRECORDS_DB_USER:openrecords}
    password: ${OPENRECORDS_DB_PASSWORD:openrecords_dev_password}
    driver-class-name: org.postgresql.Driver

  # ============================================================
  # JPA / HIBERNATE
  # ============================================================
  jpa:
    hibernate:
      # 'validate' = Hibernate verifies schema matches entities but doesn't modify.
      # Flyway owns schema changes; Hibernate only validates.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  # ============================================================
  # FLYWAY
  # ============================================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ============================================================
  # SECURITY (temporary - will swap for JWT in auth phase)
  # ============================================================
  security:
    user:
      name: ${OPENRECORDS_ADMIN_USER:admin}
      password: ${OPENRECORDS_ADMIN_PASSWORD:admin}

# ============================================================
# SERVER
# ============================================================
server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

# ============================================================
# APP-SPECIFIC CONFIG
# ============================================================
openrecords:
  tracking-number:
    prefix: FOIA