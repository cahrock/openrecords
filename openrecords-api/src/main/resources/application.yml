# ============================================================
# APPLICATION
# ============================================================
spring:
  application:
    name: openrecords-api

  # ============================================================
  # DATASOURCE - PostgreSQL
  # ============================================================
  datasource:
    url: ${OPENRECORDS_DB_URL:jdbc:postgresql://localhost:5432/openrecords}
    username: ${OPENRECORDS_DB_USER:openrecords}
    password: ${OPENRECORDS_DB_PASSWORD:openrecords_dev_password}
    driver-class-name: org.postgresql.Driver

  # ============================================================
  # JPA / HIBERNATE
  # ============================================================
  jpa:
    hibernate:
      # 'validate' = Hibernate verifies schema matches entities but doesn't modify.
      # Flyway owns schema changes; Hibernate only validates.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  # ============================================================
  # FLYWAY
  # ============================================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ============================================================
  # SECURITY (temporary - will swap for JWT in auth phase)
  # ============================================================
  security:
    user:
      name: ${OPENRECORDS_ADMIN_USER:admin}
      password: ${OPENRECORDS_ADMIN_PASSWORD:admin}

# ============================================================
# SERVER
# ============================================================
server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

# ============================================================
# APP-SPECIFIC CONFIG & JWT Authentication
# ============================================================
openrecords:
  jwt:
    # Secret used to sign tokens. Must be at least 32 bytes (256 bits) for HS256.
    # Override in production via OPENRECORDS_JWT_SECRET env var.
    secret: ${OPENRECORDS_JWT_SECRET:dev_only_secret_must_be_at_least_32_chars_long_DO_NOT_USE_IN_PRODUCTION}
    # Access token lifetime in milliseconds (15 minutes)
    access-token-ms: 900000
    # Refresh token lifetime in milliseconds (30 days)
    refresh-token-ms: 2592000000
    # Token issuer claim
    issuer: openrecords-api
  
  tracking-number:
    prefix: FOIA