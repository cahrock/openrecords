services:
  postgres:
    image: postgres:16-alpine
    container_name: openrecords-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openrecords}
      POSTGRES_USER: ${POSTGRES_USER:-openrecords}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openrecords_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - openrecords_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openrecords} -d ${POSTGRES_DB:-openrecords}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: openrecords-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  openrecords_postgres_data:
    name: openrecords_postgres_data
  pgadmin_data:
    name: openrecords_pgadmin_data